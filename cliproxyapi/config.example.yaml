# Local CLIProxyAPI example for grok-regkit companion stack
# Download binary from upstream: https://github.com/router-for-me/CLIProxyAPI
host: "127.0.0.1"
port: 8317
remote-management:
  allow-remote: false
  secret-key: ""
auth-dir: "./auths"
api-keys:
  - "replace-with-local-api-key"
debug: false
logging-to-file: false
usage-statistics-enabled: false
proxy-url: ""
request-retry: 3
quota-exceeded:
  switch-project: true
  switch-preview-model: true
routing:
  strategy: "round-robin"
  session-affinity: false
